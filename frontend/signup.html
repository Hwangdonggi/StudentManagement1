<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>회원가입 - 학생출결관리</title>
    <link rel="stylesheet" href="./styles.css">
    <script type="module">
        import { postJSON, getJSON } from './api.js';
        async function checkMe() {
        const me = await getJSON('/auth/me');
        if (me.ok) location.href = './dashboard.html';
        }
        window.addEventListener('DOMContentLoaded', checkMe);


        window.onSignup = async (e) => {
        e.preventDefault();
        const nickname = document.querySelector('#nickname').value.trim();
        const username = document.querySelector('#username').value.trim();
        const password = document.querySelector('#password').value.trim();
        const out = document.querySelector('#out');
        out.textContent = '';
        const res = await postJSON('/auth/signup', { nickname, username, password });
        if (res.ok) {
        out.textContent = '회원가입 완료! 로그인 해주세요.';
        out.className = 'success';
        setTimeout(() => location.href = './login.html', 800);
        } else {
        out.textContent = res.message || '회원가입 실패';
        out.className = 'error';
        }
        }
    </script>
</head>
<body>
<div class="container">
    <div class="nav">
        <div class="logo">학생출결관리</div>
        <div><a class="btn" href="./index.html">홈</a></div>
    </div>


    <div class="card">
        <h2>회원가입</h2>
        <form onsubmit="onSignup(event)">
            <div class="row">
                <label>닉네임
                    <input class="input" id="nickname" placeholder="닉네임" required>
                </label>
                <label>아이디
                    <input class="input" id="username" placeholder="아이디" required>
                </label>
                <label>비밀번호
                    <input type="password" class="input" id="password" placeholder="비밀번호" required>
</html>
