<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>로그인 - 학생출결관리</title>
    <link rel="stylesheet" href="./styles.css">
    <script type="module">
        import { postJSON, getJSON } from './api.js';
        async function checkMe() {
        const me = await getJSON('/auth/me');
        if (me.ok) location.href = './dashboard.html';
        }
        window.addEventListener('DOMContentLoaded', checkMe);
        window.onLogin = async (e) => {
        e.preventDefault();
        const username = document.querySelector('#username').value.trim();
        const password = document.querySelector('#password').value.trim();
        const out = document.querySelector('#out');
        out.textContent = '';
        const res = await postJSON('/auth/login', { username, password });
        if (res.ok) {
        location.href = './dashboard.html';
        } else {
        out.textContent = res.message || '로그인 실패';
        out.className = 'error';
        }
        }
    </script>
</head>
<body>
<div class="container">
    <div class="nav">
        <div class="logo">학생출결관리</div>
        <div><a class="btn" href="./index.html">홈</a></div>
    </div>


    <div class="card">
        <h2>로그인</h2>
        <form onsubmit="onLogin(event)">
            <div class="row">
                <label>아이디
                    <input class="input" id="username" placeholder="아이디" required>
                </label>
                <label>비밀번호
                    <input type="password" class="input" id="password" placeholder="비밀번호" required>
                </label>
            </div>
            <div style="margin-top:12px">
                <button class="btn btn-accent" type="submit">로그인</button>
                <a class="btn" href="./signup.html">회원가입</a>
            </div>
            <p id="out" style="margin-top:10px"></p>
        </form>
    </div>
</div>
</body>
</html>
