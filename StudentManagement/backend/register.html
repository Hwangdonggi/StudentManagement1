<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>회원가입 - 학생 출결관리</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f6fa;
            margin: 0;
        }
        .container {
            max-width: 420px;
            margin: 80px auto;
            background: #ffffff;
            padding: 30px 25px;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin: 8px 0 4px;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 8px 10px;
            margin-bottom: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border: none;
            border-radius: 8px;
            background-color: #3498db;
            color: #fff;
            font-size: 15px;
            cursor: pointer;
        }
        button:hover {
            opacity: 0.95;
        }
        .link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
        .link a {
            color: #3498db;
            text-decoration: none;
        }
        .message {
            color: #e74c3c;
            font-size: 13px;
            text-align: center;
            min-height: 18px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>회원가입</h2>

    <form action="/register" method="post">
        <label for="nickname">닉네임</label>
        <input type="text" id="nickname" name="nickname" required>

        <label for="username">아이디</label>
        <input type="text" id="username" name="username" required>

        <label for="password">비밀번호</label>
        <input type="password" id="password" name="password" required>

        <button type="submit">회원가입 완료</button>
    </form>

    <div class="message">
        <span th:text="${message}"></span>
    </div>

    <div class="link">
        이미 계정이 있나요? <a href="/login">로그인</a>
    </div>
</div>
</body>
</html>
