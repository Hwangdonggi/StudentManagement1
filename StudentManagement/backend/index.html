<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>학생 출결관리 시스템</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f6fa;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 80px auto;
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            text-align: center;
        }
        h1 {
            margin-bottom: 10px;
        }
        p {
            color: #555;
            margin-bottom: 30px;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 15px;
            text-decoration: none;
            display: inline-block;
        }
        .btn-login {
            background-color: #2ecc71;
            color: #fff;
        }
        .btn-register {
            background-color: #3498db;
            color: #fff;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>학생 출결관리 시스템</h1>
    <p>학생 출석, 지각, 결석을 관리하는 웹 페이지입니다.</p>

    <div class="btn-group">
        <a href="/login" class="btn btn-login">로그인</a>
        <a href="/register" class="btn btn-register">회원가입</a>
    </div>

    <div class="footer">
        © 2025 출결관리 프로젝트
    </div>
</div>
</body>
</html>
